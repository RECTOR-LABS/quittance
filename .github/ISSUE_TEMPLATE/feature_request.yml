name: ✨ Feature request
description: Suggest an idea for Quittance
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain or gap. "X is hard because …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: The outcome you have in mind. Keep it to the *what*, not the *how*.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - contracts (ServicerVault / Odra)
        - packages/core (quorum / signing / types)
        - packages/adapters (casper-js-sdk / casper-x402)
        - agent (servicer cycle)
        - verifiers (x402 server)
        - dashboard (Next.js)
        - e2e (harness)
        - docs / other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they fall short.

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits Quittance's mission (verification-gated cashflow servicing) and isn't already listed as out-of-scope in SPEC.md
          required: true
