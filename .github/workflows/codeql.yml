# CodeQL — semantic code analysis for the TypeScript/JavaScript surface.
# Runs on every push/PR to main and on a weekly schedule.
# https://docs.github.com/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning
name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 05:30 UTC every Monday
    - cron: "30 5 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write # required to upload CodeQL results

    strategy:
      fail-fast: false
      matrix:
        include:
          # JavaScript/TypeScript covers the agent, verifiers, adapters, core,
          # and the Next.js dashboard. CodeQL analyzes source directly — no
          # build step required for this language.
          - language: "javascript-typescript"
            build-mode: "none"
          # GitHub Actions workflow files (third-party action pinning, injection).
          - language: "actions"
            build-mode: "none"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
